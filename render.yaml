databases:
  - name: ai-news-postgres
    plan: free
    databaseName: ai_news
    user: ai_news_user

services:
  - type: web
    name: ai-news-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ai-news-postgres
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: FRONTEND_PREVIEW_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: NEWS_REFRESH_MINUTES
        value: "20"
      - key: CLEANUP_HOURS
        value: "48"
      - key: ENABLE_BACKGROUND_JOBS
        value: "true"
      - key: ENABLE_LIVE_UPDATES
        value: "true"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "12"

  - type: web
    name: ai-news-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    previews:
      generation: automatic
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: ""
      - key: VITE_API_BASE_URL
        value: ""
      - key: VITE_WS_URL
        value: ""
