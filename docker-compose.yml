version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./backend/data/ai_news.db}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4173}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:10000}
    ports:
      - "10000:10000"
    volumes:
      - ./backend:/app/backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:10000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    env_file:
      - .env
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:10000}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:10000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:10000}
    ports:
      - "4173:4173"
    depends_on:
      backend:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_news
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_news"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
